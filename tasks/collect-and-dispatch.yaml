apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: collect-and-dispatch
  labels:
    app.kubernetes.io/part-of: saritasa-cicd
spec:
  description: >-
    Diffs the already-cloned repo (against the target branch's merge-base for
    a pull_request, or the previous commit for a push) to find which
    buildpack-ready components changed, resolves a resource tier per
    component, and creates one independent component-delivery PipelineRun per
    changed component. This replaces a static PAC on-path-change trigger file
    per component: adding a new component under an already-recognized
    ecosystem (e.g. go/new-thing) needs zero Tekton configuration; adding a
    brand new ecosystem needs one new line in the tier_for()/tier_values()
    lookup below — which is unavoidable anyway, since a new ecosystem also
    needs its own Paketo builder image chosen.
  workspaces:
    - name: source
      description: Already-cloned repo (from the Pipeline's fetch-source task, reused — no second clone)
  params:
    - name: repo-url
      type: string
      description: SSH clone URL, forwarded into each dispatched PipelineRun
    - name: commit-sha
      type: string
      description: Commit SHA being built, forwarded into each dispatched PipelineRun
    - name: target-branch
      type: string
      description: Branch this push/PR targets — diff base for pull_request events
    - name: event-type
      type: string
      description: "push or pull_request — selects the diff strategy"
    - name: namespace
      type: string
      description: Namespace to create component-delivery PipelineRuns in
      default: tekton
    - name: deploy-namespace
      type: string
      description: Namespace forwarded to each dispatched PipelineRun as deploy-namespace
      default: dev
    - name: github-user
      type: string
      description: GHCR username — used to build each component's image-ref
  steps:
    - name: collect
      image: alpine/git:latest
      computeResources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "256Mi"
      script: |
        #!/bin/sh
        set -eu

        git config --global --add safe.directory '*'
        cd "$(workspaces.source.path)"

        TARGET_BRANCH="$(params.target-branch)"
        EVENT_TYPE="$(params.event-type)"

        OUT_DIR="$(workspaces.source.path)/.dispatch"
        OUT="${OUT_DIR}/components.tsv"
        mkdir -p "${OUT_DIR}"
        : > "${OUT}"

        echo "[collect] event=${EVENT_TYPE} target-branch=${TARGET_BRANCH}"

        if [ "${EVENT_TYPE}" = "pull_request" ]; then
          BASE="$(git merge-base "origin/${TARGET_BRANCH}" HEAD)"
        elif git rev-parse --verify -q HEAD^ >/dev/null; then
          BASE="HEAD^"
        else
          # First commit in the repo's (shallow) history — nothing to diff against.
          BASE="$(git hash-object -t tree /dev/null)"
        fi
        echo "[collect] diff base: ${BASE}"

        CHANGED_FILES="$(git diff --name-only "${BASE}" HEAD || true)"

        if [ -z "${CHANGED_FILES}" ]; then
          echo "[collect] no changed files detected between ${BASE} and HEAD — nothing to build"
          exit 0
        fi

        echo "[collect] changed files:"
        echo "${CHANGED_FILES}" | sed 's/^/  /'

        # Ecosystem allowlist -> resource tier. Directories not listed here
        # (tests/, scripts/, kustomize/, docs, etc.) are infra, not components,
        # and are silently ignored — they never produce a PipelineRun.
        tier_for() {
          case "$1" in
            go) echo "light" ;;
            python|php|ruby|web-servers) echo "standard" ;;
            nodejs) echo "medium" ;;
            java|dotnet-core) echo "heavy" ;;
            *) echo "" ;;
          esac
        }

        # tier -> "cpu-req cpu-lim mem-req mem-lim eph-req eph-lim workspace-size bandwidth"
        # See README.md "Resource tiers" for the rationale behind these numbers.
        tier_values() {
          case "$1" in
            light)    echo "250m 1 256Mi 512Mi 256Mi 512Mi 512Mi 10M" ;;
            standard) echo "500m 1 512Mi 768Mi 512Mi 1Gi 1Gi 15M" ;;
            medium)   echo "500m 2 512Mi 1Gi 512Mi 2Gi 2Gi 20M" ;;
            heavy)    echo "1 3 1Gi 3Gi 1Gi 6Gi 6Gi 40M" ;;
          esac
        }

        SEEN=""
        echo "${CHANGED_FILES}" | while IFS= read -r f; do
          [ -z "${f}" ] && continue
          top="$(echo "${f}" | cut -d/ -f1)"
          second="$(echo "${f}" | cut -d/ -f2)"
          [ -z "${second}" ] && continue
          tier="$(tier_for "${top}")"
          [ -z "${tier}" ] && continue
          component="${top}/${second}"
          case ",${SEEN}," in
            *,"${component}",*) continue ;;
          esac
          SEEN="${SEEN},${component}"
          id="$(echo "${component}" | tr '/' '-')"
          # shellcheck disable=SC2046
          set -- $(tier_values "${tier}")
          printf '%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\n' \
            "${id}" "${component}" "${tier}" "$1" "$2" "$3" "$4" "$5" "$6" "$7" >> "${OUT}"
        done

        echo "[collect] detected components:"
        if [ -s "${OUT}" ]; then
          cut -f1,2,3 "${OUT}" | sed 's/^/  /'
        else
          echo "  (none — no buildpack-ready component changed)"
        fi

    - name: dispatch
      image: bitnami/kubectl:latest
      # v1 Step renamed resources -> computeResources (v1beta1 kept the old name).
      computeResources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
      script: |
        #!/bin/bash
        set -euo pipefail

        OUT="$(workspaces.source.path)/.dispatch/components.tsv"
        NAMESPACE="$(params.namespace)"
        DEPLOY_NAMESPACE="$(params.deploy-namespace)"
        COMMIT_SHA="$(params.commit-sha)"
        REPO_URL="$(params.repo-url)"
        GITHUB_USER="$(params.github-user)"

        if [[ ! -s "${OUT}" ]]; then
          echo "[dispatch] no buildpack-ready components changed — nothing to build. Skipping."
          exit 0
        fi

        count=0
        while IFS=$'\t' read -r id subpath tier cpu_req cpu_lim mem_req mem_lim eph_req eph_lim ws_size bandwidth; do
          [[ -z "${id}" ]] && continue
          count=$((count + 1))
          image_ref="ghcr.io/${GITHUB_USER}/${id}:${COMMIT_SHA}"
          echo "[dispatch] creating PipelineRun for component=${id} path=${subpath} tier=${tier} image=${image_ref}"

          cat <<EOF | kubectl create -f -
        apiVersion: tekton.dev/v1
        kind: PipelineRun
        metadata:
          generateName: ${id}-
          namespace: ${NAMESPACE}
          labels:
            app.kubernetes.io/part-of: saritasa-cicd
            saritasa.dev/component: ${id}
            saritasa.dev/resource-tier: ${tier}
            saritasa.dev/pipeline-role: build-deploy
          annotations:
            # Best-effort, CNI-dependent — see README.md "Network bandwidth".
            kubernetes.io/ingress-bandwidth: "${bandwidth}"
            kubernetes.io/egress-bandwidth: "${bandwidth}"
        spec:
          timeouts:
            pipeline: "10m0s"
            tasks: "8m0s"
          pipelineRef:
            name: component-delivery
          taskRunTemplate:
            serviceAccountName: pipeline-sa
          params:
            - name: component-id
              value: ${id}
            - name: source-subpath
              value: ${subpath}
            - name: image-ref
              value: ${image_ref}
            - name: commit-sha
              value: "${COMMIT_SHA}"
            - name: repo-url
              value: "${REPO_URL}"
            - name: deploy-namespace
              value: ${DEPLOY_NAMESPACE}
          # Per-component resource tier, applied as a literal override on the
          # build-image PipelineTask's create step -- NOT as Pipeline params
          # (resources.requests/limits is resource.Quantity-typed, so a
          # templated placeholder in the Task itself fails admission
          # validation; this field carries already-resolved literal values,
          # so it doesn't hit that constraint). Beta API field, already
          # enabled on this cluster (feature-flags: enable-api-fields=beta).
          taskRunSpecs:
            - pipelineTaskName: build-image
              stepSpecs:
                - name: create
                  computeResources:
                    requests:
                      cpu: "${cpu_req}"
                      memory: "${mem_req}"
                      ephemeral-storage: "${eph_req}"
                    limits:
                      cpu: "${cpu_lim}"
                      memory: "${mem_lim}"
                      ephemeral-storage: "${eph_lim}"
          workspaces:
            - name: source
              volumeClaimTemplate:
                spec:
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: ${ws_size}
            - name: git-credentials
              secret:
                secretName: git-credentials
            - name: dockerconfig
              secret:
                secretName: ghcr-credentials
                items:
                  - key: .dockerconfigjson
                    path: config.json
        EOF
        done < "${OUT}"

        if [[ "${count}" -eq 0 ]]; then
          echo "[dispatch] no buildpack-ready components among the changed files — nothing to build"
        else
          echo "[dispatch] done — created ${count} component PipelineRun(s)"
        fi
