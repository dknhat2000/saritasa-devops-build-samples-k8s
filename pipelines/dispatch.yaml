apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: dispatch
  labels:
    app.kubernetes.io/part-of: saritasa-cicd
  annotations:
    # Replaces one static PAC on-path-change trigger file per component (the
    # original design: 6 hardcoded .tekton/*.yaml files, one per known
    # component — doesn't scale, and moving/renaming a component's folder or
    # adding a new one under an existing ecosystem required editing Tekton
    # config). This Pipeline is the SAME regardless of what changed: the
    # changed-files list is computed by PAC itself (via
    # {{ cel: files.all.join(",") }} in the app repo's .tekton/dispatch.yaml,
    # the same job the old raw-Triggers design's GitHub interceptor
    # addChangedFiles feature did — see commit 0e16247d/8e680b0a in the app
    # repo's history) and handed to us as a plain param, so this Pipeline
    # never needs to clone the repo or compute its own diff.
    saritasa.dev/replaces: "static per-component PAC PipelineRun trigger files"
spec:
  description: >-
    Entry point for every push/PR to the app repo (one PipelineRun, created
    directly by PAC from the app repo's single .tekton/dispatch.yaml trigger,
    regardless of which or how many components changed). Takes the
    already-computed changed-files list, detects which buildpack-ready
    components were touched, resolves a resource tier per component, and
    kubectl-creates one independent component-delivery PipelineRun per changed
    component — so a commit touching N components fans out to N
    independently-scheduled, independently-tiered builds. No clone here: this
    Pipeline decides *what* to build, component-delivery clones and builds it.
  params:
    - name: changed-files
      type: string
      description: Comma-separated list of file paths changed by this push/PR (from PAC's files.all)
    - name: commit-sha
      type: string
      description: Git commit SHA to build from, forwarded to each dispatched PipelineRun
    - name: repo-url
      type: string
      description: SSH clone URL, forwarded to each dispatched PipelineRun
    - name: github-user
      type: string
      description: GHCR username — used to build each component's image-ref
    - name: deploy-namespace
      type: string
      description: Kubernetes namespace forwarded to each dispatched PipelineRun
      default: dev
  tasks:
    - name: collect-and-dispatch
      taskRef:
        name: collect-and-dispatch
      params:
        - name: changed-files
          value: $(params.changed-files)
        - name: commit-sha
          value: $(params.commit-sha)
        - name: repo-url
          value: $(params.repo-url)
        - name: github-user
          value: $(params.github-user)
        - name: deploy-namespace
          value: $(params.deploy-namespace)
