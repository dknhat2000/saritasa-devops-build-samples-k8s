apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pipeline-role-dev
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    # create is required: kubectl apply creates the Deployment on its first
    # run for a component, and recreates it if it was ever deleted — patch
    # alone would fail in both cases (see component-delivery.yaml's rollout
    # step and README.md's idempotent-deploy note).
    verbs: ["get", "list", "watch", "create", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-rolebinding-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pipeline-role-dev
subjects:
  # cross-namespace: pipeline-sa lives in tekton, not dev — must stay pinned here,
  # not rewritten by the dev-namespace Kustomize overlay's namespace transformer.
  - kind: ServiceAccount
    name: pipeline-sa
    namespace: tekton
