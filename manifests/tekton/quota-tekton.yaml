apiVersion: v1
kind: ResourceQuota
metadata:
  name: pipeline-quota
spec:
  hard:
    requests.cpu: "3"
    requests.memory: "6Gi"
    requests.ephemeral-storage: "10Gi"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: pipeline-limits
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: "500m"
        memory: "512Mi"
        ephemeral-storage: "512Mi"
      default:
        cpu: "1"
        memory: "1Gi"
        ephemeral-storage: "2Gi"
      max:
        cpu: "2"
        memory: "4Gi"
        ephemeral-storage: "4Gi"
      min:
        cpu: "10m"
        memory: "32Mi"
        ephemeral-storage: "64Mi"
