apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pac-task-reader
rules:
  - apiGroups: ["tekton.dev"]
    resources: ["tasks"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pac-task-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pac-task-reader
subjects:
  - kind: ServiceAccount
    name: pipelines-as-code-controller
    namespace: pipelines-as-code
